name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: package-release / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  run_tests: false, generators: "TGZ;ZIP;DEB;RPM" }
          - { os: macos-latest,   run_tests: false, generators: "TGZ;ZIP" }
          - { os: windows-latest, run_tests: false, generators: "ZIP" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset package-release

      - name: Build
        run: cmake --build --preset package-release --config Release

      - name: Package with CPack
        shell: bash
        run: |
          cd build/package-release
          cpack -C Release -G "${{ matrix.generators }}"

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p dist
          # Move packages to a flat directory for the release action
          mv build/package-release/*.tar.gz dist/ 2>/dev/null || true
          mv build/package-release/*.deb dist/ 2>/dev/null || true
          mv build/package-release/*.rpm dist/ 2>/dev/null || true
          mv build/package-release/*.zip dist/ 2>/dev/null || true
          cp LICENSE.md dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
