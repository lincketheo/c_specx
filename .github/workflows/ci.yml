name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: ${{ matrix.preset }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          - { os: ubuntu-latest,  preset: debug,                 run_tests: true  }
          - { os: ubuntu-latest,  preset: debug-no-asan,         run_tests: true  }
          - { os: ubuntu-latest,  preset: debug-ntests,          run_tests: false }
          - { os: ubuntu-latest,  preset: debug-ntests-no-asan,  run_tests: false }
          - { os: ubuntu-latest,  preset: release,               run_tests: false }
          - { os: ubuntu-latest,  preset: release-tests,         run_tests: true  }
          - { os: ubuntu-latest,  preset: package-release,       run_tests: false }

          # macOS 
          - { os: macos-latest,   preset: debug,                 run_tests: true  }
          - { os: macos-latest,   preset: debug-no-asan,         run_tests: true  }
          - { os: macos-latest,   preset: debug-ntests,          run_tests: false }
          - { os: macos-latest,   preset: debug-ntests-no-asan,  run_tests: false }
          - { os: macos-latest,   preset: release,               run_tests: false }
          - { os: macos-latest,   preset: release-tests,         run_tests: true  }
          - { os: macos-latest,   preset: package-release,       run_tests: false }

          # Windows native (MSVC + Ninja) 
          - { os: windows-latest,   preset: debug,                 run_tests: true  }
          - { os: windows-latest,   preset: debug-no-asan,         run_tests: true  }
          - { os: windows-latest,   preset: debug-ntests,          run_tests: false }
          - { os: windows-latest,   preset: debug-ntests-no-asan,  run_tests: false }
          - { os: windows-latest,   preset: release,               run_tests: false }
          - { os: windows-latest,   preset: release-tests,         run_tests: true  }
          - { os: windows-latest,   preset: package-release,       run_tests: false }

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: matrix.run_tests
        shell: bash
        run: |
          [[ "${{ runner.os }}" == "Windows" ]] && EXT=".exe" || EXT=""
          ./build/${{ matrix.preset }}/c_specx_test
